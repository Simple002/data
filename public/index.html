<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>💬 Реал-тайм чат</title>
  <style>
    body { font-family: sans-serif; background: #1e1e1e; color: #fff; }
    #chat { max-width: 600px; margin: 30px auto; }
    #messages { list-style: none; padding: 0; height: 300px; overflow-y: auto; background: #2e2e2e; border-radius: 10px; }
    #messages li { padding: 8px; border-bottom: 1px solid #444; }
    #form { display: flex; margin-top: 10px; }
    #input { flex: 1; padding: 10px; border: none; border-radius: 6px 0 0 6px; font-size: 16px; }
    #send { padding: 10px; background: #28a745; border: none; color: white; border-radius: 0 6px 6px 0; cursor: pointer; }
  </style>
</head>
<body>
  <div id="chat">
    <h2>🔥 Реал-тайм Чат</h2>
    <ul id="messages"></ul>
    <form id="form" action="">
      <input id="input" autocomplete="off" placeholder="Введите сообщение..." />
      <button id="send">Отправить</button>
    </form>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const messages = document.getElementById('messages');

    let username = prompt("Введите имя:");
    while (!username) {
      username = prompt("Имя обязательно:");
    }

    socket.emit('set username', username);

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      if (input.value) {
        socket.emit('chat message', input.value);
        input.value = '';
      }
    });

    socket.on('chat message', (msg) => {
      addMessage(`${msg.username}: ${msg.text}`);
    });

    socket.on('user joined', (name) => {
      addMessage(`🔵 ${name} вошёл в чат`);
    });

    socket.on('user left', (name) => {
      addMessage(`🔴 ${name} покинул чат`);
    });

    function addMessage(text) {
      const li = document.createElement('li');
      li.textContent = text;
      messages.appendChild(li);
      messages.scrollTop = messages.scrollHeight;
    }
  </script>
</body>
</html>
